[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Range, Content-Type"
    Accept-Ranges = "bytes"

[[headers]]
  for = "/*.mp3"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Accept-Ranges = "bytes"
    Cache-Control = "public, max-age=31536000"